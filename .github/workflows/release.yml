name: Release

on:
  push:
    tags:
      - 'v*'          # triggers on v0.1.0, v1.0.0-beta.1, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write    # needed to create GitHub Releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustyclaw-linux-x64
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustyclaw-linux-arm64
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: rustyclaw-linux-x64-musl
            cross: true

          # ── macOS ──────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-14          # Apple Silicon runner (cross-compiles to x86_64)
            artifact: rustyclaw-macos-x64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-14          # Apple Silicon runner
            artifact: rustyclaw-macos-arm64
            cross: false

          # ── Windows ────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: rustyclaw-windows-x64.exe
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux cross-compilation via cross
      - name: Install cross (Linux only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # Native builds (macOS / Windows)
      - name: Build release (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────
      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/rustyclaw ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/rustyclaw.exe" "${{ matrix.artifact }}"

      - name: Generate checksum (unix)
        if: runner.os != 'Windows'
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi

      - name: Generate checksum (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii "${{ matrix.artifact }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create manifest
        run: |
          cd release
          cat > manifest.json <<'SCRIPT'
          {
            "platforms": {}
          }
          SCRIPT
          # Build proper manifest with jq
          echo '{}' > manifest.json
          for f in rustyclaw-*; do
            [[ "$f" == *.sha256 ]] && continue
            [[ ! -f "${f}.sha256" ]] && continue
            checksum=$(cut -d' ' -f1 < "${f}.sha256")
            jq --arg name "$f" --arg sum "$checksum" \
              '.[$name] = {"checksum": $sum}' manifest.json > tmp.json
            mv tmp.json manifest.json
          done
          # Wrap in platforms key
          jq '{platforms: .}' manifest.json > tmp.json
          mv tmp.json manifest.json
          cat manifest.json

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "RustyClaw $TAG" \
            --generate-notes \
            release/*
