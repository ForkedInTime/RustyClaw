name: Release

on:
  push:
    tags:
      - 'v*'          # triggers on v0.1.0, v1.0.0-beta.1, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write    # needed to create GitHub Releases and upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustyclaw-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustyclaw-linux-arm64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: rustyclaw-linux-x64-musl

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/rustyclaw ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Generate checksum
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create manifest
        run: |
          cd release
          echo '{' > manifest.json
          echo '  "platforms": {' >> manifest.json
          first=true
          for f in rustyclaw-*; do
            [[ "$f" == *.sha256 ]] && continue
            checksum=$(cat "${f}.sha256" | cut -d' ' -f1)
            if [ "$first" = true ]; then first=false; else echo ',' >> manifest.json; fi
            printf '    "%s": { "checksum": "%s" }' "$f" "$checksum" >> manifest.json
          done
          echo '' >> manifest.json
          echo '  }' >> manifest.json
          echo '}' >> manifest.json
          cat manifest.json

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "RustyClaw $TAG" \
            --generate-notes \
            release/*
