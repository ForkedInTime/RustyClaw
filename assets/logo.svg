<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RustyClaw logo">
  <title>RustyClaw</title>

  <defs>
    <!-- Oxidised rust gradient: deep brown-red at the base, bright orange at the edge -->
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#5A1E0A"/>
      <stop offset="0.45" stop-color="#B23616"/>
      <stop offset="1"    stop-color="#F08A3E"/>
    </linearGradient>

    <linearGradient id="rustDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#3A140A"/>
      <stop offset="1"    stop-color="#8B2500"/>
    </linearGradient>

    <!-- Bronze/amber highlight for the captured cursor -->
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD08A"/>
      <stop offset="1" stop-color="#E88F50"/>
    </linearGradient>

    <!-- Soft inner shadow inside the claw body -->
    <radialGradient id="depth" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1"   stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- ── Rounded-square app icon backdrop (dark terminal) ─────────────── -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#0D1117"/>

  <!-- subtle inner vignette so the claw feels embedded -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#depth)"/>

  <!-- ── Upper pincer (curved angular wedge, pointing right-down) ────── -->
  <g transform="translate(256 256)">
    <!-- Top claw -->
    <path d="
      M -165 -155
      C -100 -165, -30 -140, 40 -80
      L 95 -35
      L 60 -5
      L 10 -40
      C -40 -75, -95 -90, -135 -75
      C -165 -60, -175 -25, -165 10
      L -180 30
      C -210 -20, -210 -95, -165 -155 Z"
      fill="url(#rust)"
      stroke="#1A0703"
      stroke-width="6"
      stroke-linejoin="round"/>

    <!-- Bottom claw (mirror of top) -->
    <path d="
      M -165 155
      C -100 165, -30 140, 40 80
      L 95 35
      L 60 5
      L 10 40
      C -40 75, -95 90, -135 75
      C -165 60, -175 25, -165 -10
      L -180 -30
      C -210 20, -210 95, -165 155 Z"
      fill="url(#rust)"
      stroke="#1A0703"
      stroke-width="6"
      stroke-linejoin="round"/>

    <!-- ── Captured prompt chevron ">" held between the pincers ──── -->
    <!-- Ink outline drawn first for contrast against the claw body -->
    <polyline points="-30,-55  35,0  -30,55"
              fill="none"
              stroke="#2A0F05"
              stroke-width="38"
              stroke-linecap="round"
              stroke-linejoin="round"/>
    <!-- Bronze chevron on top -->
    <polyline points="-30,-55  35,0  -30,55"
              fill="none"
              stroke="url(#bronze)"
              stroke-width="26"
              stroke-linecap="round"
              stroke-linejoin="round"/>

    <!-- ── Articulated joint hub (where the two pincers meet) ──────── -->
    <circle cx="-155" cy="0" r="48"
            fill="url(#rustDark)"
            stroke="#1A0703"
            stroke-width="6"/>
    <circle cx="-155" cy="0" r="16" fill="#1A0703"/>
    <circle cx="-155" cy="0" r="6"  fill="#F08A3E"/>

    <!-- ── Subtle rivet highlights along each claw edge ───────────── -->
    <circle cx="-120" cy="-95" r="5" fill="#FFD08A" opacity="0.7"/>
    <circle cx="-40"  cy="-105" r="4" fill="#FFD08A" opacity="0.6"/>
    <circle cx="-120" cy="95"   r="5" fill="#FFD08A" opacity="0.7"/>
    <circle cx="-40"  cy="105"  r="4" fill="#FFD08A" opacity="0.6"/>
  </g>
</svg>
