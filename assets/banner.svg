<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 700" role="img" aria-label="RustyClaw — Claude Code, carved in Rust">
  <title>RustyClaw</title>

  <defs>
    <!-- Background: left is deep black, right fades into GitHub-dark -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#05080D"/>
      <stop offset="0.35" stop-color="#0D1117"/>
      <stop offset="1"   stop-color="#161B22"/>
    </linearGradient>

    <!-- Rust gradients (shared with logo.svg) -->
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#5A1E0A"/>
      <stop offset="0.45" stop-color="#B23616"/>
      <stop offset="1"    stop-color="#F08A3E"/>
    </linearGradient>
    <linearGradient id="rustDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A140A"/>
      <stop offset="1" stop-color="#8B2500"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD08A"/>
      <stop offset="1" stop-color="#E88F50"/>
    </linearGradient>

    <!-- Wordmark fill: warm off-white with a rust kiss at the tail -->
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#F5E9D8"/>
      <stop offset="0.75" stop-color="#F5E9D8"/>
      <stop offset="1"    stop-color="#F08A3E"/>
    </linearGradient>

    <!-- Very subtle grid on the right side (circuit/terminal feel) -->
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#1F2833" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- ── Background plate ────────────────────────────────────────────── -->
  <rect width="2400" height="700" fill="url(#bg)"/>
  <rect x="900" y="0" width="1500" height="700" fill="url(#grid)" opacity="0.5"/>

  <!-- Rust accent bar along the bottom -->
  <rect x="0" y="692" width="2400" height="8" fill="url(#rust)" opacity="0.9"/>

  <!-- ── Mascot (scaled from logo.svg, no rounded-rect frame) ──────── -->
  <!-- Center at (380, 350), scale 0.9 -->
  <g transform="translate(380 350) scale(0.9)">
    <path d="
      M -165 -155
      C -100 -165, -30 -140, 40 -80
      L 95 -35
      L 60 -5
      L 10 -40
      C -40 -75, -95 -90, -135 -75
      C -165 -60, -175 -25, -165 10
      L -180 30
      C -210 -20, -210 -95, -165 -155 Z"
      fill="url(#rust)"
      stroke="#1A0703"
      stroke-width="6"
      stroke-linejoin="round"/>

    <path d="
      M -165 155
      C -100 165, -30 140, 40 80
      L 95 35
      L 60 5
      L 10 40
      C -40 75, -95 90, -135 75
      C -165 60, -175 25, -165 -10
      L -180 -30
      C -210 20, -210 95, -165 155 Z"
      fill="url(#rust)"
      stroke="#1A0703"
      stroke-width="6"
      stroke-linejoin="round"/>

    <!-- Joint hub -->
    <circle cx="-155" cy="0" r="48" fill="url(#rustDark)" stroke="#1A0703" stroke-width="6"/>
    <circle cx="-155" cy="0" r="16" fill="#1A0703"/>
    <circle cx="-155" cy="0" r="6"  fill="#F08A3E"/>

    <!-- Rivets -->
    <circle cx="-120" cy="-95" r="5" fill="#FFD08A" opacity="0.7"/>
    <circle cx="-40"  cy="-105" r="4" fill="#FFD08A" opacity="0.6"/>
    <circle cx="-120" cy="95"   r="5" fill="#FFD08A" opacity="0.7"/>
    <circle cx="-40"  cy="105"  r="4" fill="#FFD08A" opacity="0.6"/>

    <!-- Bronze prompt chevron -->
    <polyline points="-30,-55 35,0 -30,55"
              fill="none" stroke="#2A0F05" stroke-width="38"
              stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="-30,-55 35,0 -30,55"
              fill="none" stroke="url(#bronze)" stroke-width="26"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── Wordmark + tagline (lots of breathing room) ──────────────── -->
  <!-- Wordmark uses a bold sans (much narrower than mono) so "RustyClaw" fits comfortably. -->
  <g font-family="DejaVu Sans, Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="780" y="340"
          font-size="220"
          font-weight="900"
          fill="url(#wordmark)"
          letter-spacing="-4">RustyClaw</text>

    <!-- Accent rule under the wordmark -->
    <rect x="784" y="380" width="220" height="9" fill="url(#rust)" rx="3"/>
  </g>

  <g font-family="JetBrainsMono Nerd Font, JetBrains Mono, Fira Code, ui-monospace, Menlo, Consolas, monospace">
    <!-- Primary tagline -->
    <text x="780" y="465"
          font-size="54"
          font-weight="500"
          fill="#C9D1D9">Claude Code, carved in Rust.</text>

    <!-- Feature line — concise, punchy -->
    <text x="780" y="540"
          font-size="36"
          font-weight="400"
          fill="#8B949E">19 MB static binary · sub-50 ms cold-start · Ollama · local RAG · voice · offline</text>

    <!-- Prompt flourish along the bottom -->
    <g transform="translate(780 620)"
       font-size="34"
       font-weight="500">
      <text fill="#F08A3E">$</text>
      <text x="36" fill="#F5E9D8">rustyclaw</text>
      <text x="286" fill="#58A6FF">—</text>
      <text x="326" fill="#8B949E">grip your codebase.</text>
    </g>
  </g>
</svg>
